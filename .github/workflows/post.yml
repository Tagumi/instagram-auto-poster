name: Instagram Auto Post

on:
  schedule:
    - cron: '1 23 * * *'  # JST 8:01 (UTC 23:01 前日) - :00ちょうどは混雑回避のためずらす
    - cron: '1 7 * * *'   # JST 16:01 (UTC 7:01) - 同上
  workflow_dispatch:
    inputs:
      post_index:
        description: 'posts.json の何番目を投稿するか (0始まり、空欄なら自動)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Determine post index
        run: |
          if [ -n "${{ github.event.inputs.post_index }}" ]; then
            echo "POST_INDEX=${{ github.event.inputs.post_index }}" >> $GITHUB_ENV
          fi

      - name: Post to Instagram
        env:
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python post_scheduled.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update post index [skip ci]"
          git push
